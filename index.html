<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CARSFY – Estamos de obras</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --brand:   #0066FF;
      --accent:  #FF6B00;
      --dark:    #0A0E1A;
      --light:   #F4F6FC;
      --stripe1: rgba(0, 102, 255, 0.07);
      --stripe2: transparent;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--dark);
      color: var(--light);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Animated diagonal stripes background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        -45deg,
        var(--stripe1),
        var(--stripe1) 40px,
        var(--stripe2) 40px,
        var(--stripe2) 80px
      );
      animation: stripeMove 20s linear infinite;
      z-index: 0;
    }

    @keyframes stripeMove {
      0%   { background-position: 0 0; }
      100% { background-position: 113px 113px; }
    }

    /* Glow blobs */
    .blob {
      position: fixed;
      border-radius: 50%;
      filter: blur(120px);
      opacity: 0.25;
      z-index: 0;
    }
    .blob-1 { width: 500px; height: 500px; background: var(--brand); top: -100px; left: -100px; animation: float 12s ease-in-out infinite; }
    .blob-2 { width: 400px; height: 400px; background: var(--accent); bottom: -80px; right: -80px; animation: float 10s ease-in-out infinite reverse; }

    @keyframes float {
      0%, 100% { transform: translate(0, 0) scale(1); }
      50%       { transform: translate(40px, 30px) scale(1.08); }
    }

    /* Content card */
    .card {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 3rem 2.5rem;
      max-width: 680px;
      width: 90%;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 24px;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      box-shadow: 0 32px 80px rgba(0,0,0,0.5);
    }

    /* Warning tape top */
    .tape {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 8px;
      border-radius: 24px 24px 0 0;
      background: repeating-linear-gradient(
        90deg,
        var(--accent) 0px, var(--accent) 20px,
        #1a1a2e 20px, #1a1a2e 40px
      );
    }

    /* Hard hat icon */
    .icon-wrap {
      width: 88px;
      height: 88px;
      margin: 1rem auto 1.5rem;
      background: linear-gradient(135deg, var(--brand), #004dcc);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 40px rgba(0,102,255,0.4);
      animation: pulse 3s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 40px rgba(0,102,255,0.4); }
      50%       { box-shadow: 0 0 70px rgba(0,102,255,0.7); }
    }

    .icon-wrap svg { width: 48px; height: 48px; }

    /* Logo */
    .logo {
      font-size: clamp(2.8rem, 8vw, 4.5rem);
      font-weight: 900;
      letter-spacing: -2px;
      background: linear-gradient(135deg, #fff 30%, var(--brand) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1;
      margin-bottom: 0.5rem;
    }

    .tagline {
      font-size: 1.15rem;
      font-weight: 600;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 3px;
      margin-bottom: 1.5rem;
    }

    .description {
      font-size: 1rem;
      font-weight: 300;
      color: rgba(255,255,255,0.65);
      line-height: 1.7;
      margin-bottom: 2rem;
    }

    /* Progress bar */
    .progress-label {
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: rgba(255,255,255,0.4);
      margin-bottom: 0.5rem;
    }

    .progress-track {
      background: rgba(255,255,255,0.08);
      border-radius: 99px;
      height: 6px;
      overflow: hidden;
      margin-bottom: 2rem;
    }

    .progress-fill {
      height: 100%;
      border-radius: 99px;
      background: linear-gradient(90deg, var(--brand), var(--accent));
      width: 0%;
      animation: progressLoad 2.5s cubic-bezier(.4,0,.2,1) forwards;
      animation-delay: 0.3s;
    }

    @keyframes progressLoad {
      to { width: 65%; }
    }

    /* Badge */
    .badge {
      display: inline-block;
      padding: 0.45rem 1.2rem;
      border-radius: 99px;
      background: rgba(0,102,255,0.15);
      border: 1px solid rgba(0,102,255,0.4);
      font-size: 0.82rem;
      font-weight: 600;
      color: #66aaff;
      letter-spacing: 1px;
    }

    /* Footer */
    .footer {
      position: relative;
      z-index: 1;
      margin-top: 2rem;
      font-size: 0.75rem;
      color: rgba(255,255,255,0.2);
      letter-spacing: 1px;
    }
  </style>
</head>
<body>
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>

  <div class="card">
    <div class="tape"></div>

    <div class="icon-wrap">
      <!-- Hard hat SVG -->
      <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M8 30h32v4a2 2 0 01-2 2H10a2 2 0 01-2-2v-4z" fill="#FFD700"/>
        <path d="M24 8c-8 0-14 6-14 14v8h28v-8c0-8-6-14-14-14z" fill="#FFC200"/>
        <path d="M18 8.5v13.5h12V8.5" stroke="#FFD700" stroke-width="2" stroke-linecap="round"/>
        <rect x="4" y="28" width="40" height="4" rx="2" fill="#FFB700"/>
      </svg>
    </div>

    <div class="logo">CARSFY</div>
    <div class="tagline">Estamos de obras</div>

    <p class="description">
      Estamos construyendo algo increíble.<br/>
      Nuestro equipo trabaja a fondo para ofrecerte<br/>
      la mejor experiencia. ¡Volvemos pronto!
    </p>

    <p class="progress-label">Progreso</p>
    <div class="progress-track">
      <div class="progress-fill"></div>
    </div>

    <span class="badge">🚧 Próximamente disponible</span>
  </div>

  <p class="footer">© 2026 CARSFY · Todos los derechos reservados</p>
</body>
</html>
